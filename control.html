<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERKAVIM CONTROL - PRO</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding-bottom: 50px; }
        .header { background: #2c3e50; padding: 15px; border-bottom: 3px solid #3498db; }
        
        /* Стили сканера */
        #reader { width: 90%; max-width: 400px; margin: 20px auto; border-radius: 15px; overflow: hidden; border: 2px solid #34495e; }
        .btn-start { background: #3498db; color: white; padding: 12px 25px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 20px; }

        /* Стили клавиатуры-антистресс */
        .keypad-container {
            background: #252525;
            width: 280px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }
        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .key {
            background: #333;
            color: white;
            border: none;
            padding: 20px;
            font-size: 24px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 4px #000;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            margin: auto;
        }
        .key:active {
            background: #444;
            transform: translateY(4px);
            box-shadow: 0 0 #000;
        }
        .key-special { color: #3498db; font-weight: bold; }
        
        #display {
            background: #000;
            color: #2ecc71;
            padding: 10px;
            font-family: monospace;
            font-size: 20px;
            margin-bottom: 15px;
            border-radius: 5px;
            min-height: 25px;
            letter-spacing: 2px;
        }

        .result-box { margin: 20px; padding: 20px; border-radius: 10px; display: none; background: #27ae60; }
    </style>
</head>
<body>

<div class="header">
    <h1>MERKAVIM CONTROL</h1>
    <p>Терминал: #776636</p>
</div>

<div id="reader"></div>
<button class="btn-start" onclick="startScanner()">📷 ВКЛЮЧИТЬ СКАНЕР</button>

<div class="keypad-container">
    <div id="display">READY_</div>
    <div class="keypad-grid">
        <button class="key" onclick="press('1')">1</button>
        <button class="key" onclick="press('2')">2</button>
        <button class="key" onclick="press('3')">3</button>
        <button class="key" onclick="press('4')">4</button>
        <button class="key" onclick="press('5')">5</button>
        <button class="key" onclick="press('6')">6</button>
        <button class="key" onclick="press('7')">7</button>
        <button class="key" onclick="press('8')">8</button>
        <button class="key" onclick="press('9')">9</button>
        <button class="key key-special" onclick="press('*')">*</button>
        <button class="key" onclick="press('0')">0</button>
        <button class="key key-special" onclick="press('#')">#</button>
    </div>
    <button class="btn-start" style="margin-top:20px; width:100%; background:#e74c3c;" onclick="clearDisplay()">СБРОС</button>
</div>

<div id="result" class="result-box">
    <h2 id="res-title">✅ БИЛЕТ СЧИТАН</h2>
    <p id="res-text"></p>
</div>

<script>
    let displayContent = "";

    // Функция звука для кнопок
    function playBeep(freq = 440) {
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
        setTimeout(() => osc.stop(), 100);
    }

    function press(num) {
        playBeep(600); // Обычный писк кнопки
        displayContent += num;
        document.getElementById('display').innerText = displayContent;
        
        // Антистресс эффект: если тыкаешь много, экран мигает
        if(displayContent.length > 12) {
            displayContent = "ERR_OVERLOAD";
            playBeep(200); // Низкий звук ошибки
            setTimeout(clearDisplay, 500);
        }
    }

    function clearDisplay() {
        displayContent = "";
        document.getElementById('display').innerText = "READY_";
        playBeep(300);
    }

    function startScanner() {
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
        (text) => {
            playBeep(880); 
            document.getElementById('result').style.display = "block";
            document.getElementById('res-text').innerText = text;
        }).catch(err => console.log(err));
    }
</script>

</body>
</html>
