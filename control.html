<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERKAVIM CONTROL - SCANNER</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .header { background: #2c3e50; padding: 15px; }
        #reader { width: 100%; max-width: 500px; margin: 20px auto; border-radius: 10px; overflow: hidden; }
        .result-box { margin: 20px; padding: 20px; border-radius: 10px; display: none; }
        .success { background: #27ae60; }
        .btn-start { background: #3498db; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>MERKAVIM CONTROL</h1>
    <p>Режим сканирования билетов</p>
</div>

<div id="reader"></div>

<button class="btn-start" onclick="startScanner()">ВКЛЮЧИТЬ СКАНЕР</button>

<div id="result" class="result-box">
    <h2 id="res-title"></h2>
    <p id="res-text"></p>
</div>

<script>
    function startScanner() {
        const html5QrCode = new Html5Qrcode("reader");
        const qrCodeSuccessCallback = (decodedText, decodedResult) => {
            // Когда код отсканирован:
            showResult(decodedText);
            html5QrCode.stop(); // Остановить камеру после успеха
        };
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        html5QrCode.start({ facingMode: "environment" }, config, qrCodeSuccessCallback)
        .catch(err => alert("Ошибка камеры: " + err));
    }

    function showResult(text) {
        const resBox = document.getElementById('result');
        const resTitle = document.getElementById('res-title');
        const resText = document.getElementById('res-text');
        
        // Писк при сканировании
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = audioCtx.createOscillator();
        osc.connect(audioCtx.destination);
        osc.start();
        setTimeout(() => osc.stop(), 150);

        resBox.style.display = "block";
        resBox.className = "result-box success";
        resTitle.innerText = "✅ БИЛЕТ СЧИТАН";
        // Выводим весь текст из QR (например, TICKET_17766...)
        resText.innerText = "ДАННЫЕ: " + text;
    }
</script>

</body>
</html>
