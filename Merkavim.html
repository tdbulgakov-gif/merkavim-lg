<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MERKAVIM v-21.3 - ULTIMATE MEGA VERSION 🚌</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        body { background-image: url('5415960465159953094.jpg'); background-size: cover; background-position: top; background-attachment: fixed; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; }
        .header { background: white; padding: 15px; border-bottom: 1px solid #ddd; }
        .header h1 { margin: 0; font-size: 32px; letter-spacing: 2px; color: #333; font-weight: 900; }
        .top-time-bar { background: #2c3e50; color: white; padding: 8px; font-size: 16px; font-weight: bold; }
        .main-board { background: #202b36; color: #ff9d00; padding: 25px; border-radius: 15px; font-family: monospace; font-size: 24px; width: 85%; margin: 20px auto; border: 1px solid #444; min-height: 120px; display: flex; flex-direction: column; justify-content: center; }
        #announcement { color: #ff4444; font-weight: bold; font-size: 20px; margin-top: 15px; min-height: 30px; }
        .blink { animation: blinker 0.8s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .btn-container { width: 90%; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { width: 100%; border: none; padding: 20px; border-radius: 15px; font-size: 20px; font-weight: bold; color: white; cursor: pointer; display: block;}
        .btn-green { background: #2e7d32; } .btn-blue { background: #3498db; } .btn-orange { background: #ff9f43; }
        .screen { display: none; padding: 20px; }
        .active { display: block; }
        .admin-panel { background: #f9f9f9; padding: 20px; border-radius: 15px; margin: 20px auto; width: 85%; display: none; border: 4px solid #333; }
        .map-container { width: 90%; height: 50px; background: #bdc3c7; margin: 50px auto 20px auto; position: relative; border-radius: 25px; border: 4px solid #2c3e50; }
        .bus-icon { position: absolute; top: -18px; font-size: 45px; transition: left 0.5s linear; z-index: 10; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5)); }
        .map-label { position: absolute; bottom: -35px; font-size: 14px; font-weight: bold; color: #2c3e50; width: 100px; }
        #qrcode { margin-top: 20px; display: flex; justify-content: center; background: white; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header"><h1>MERKAVIM</h1></div>
    <div id="top-bar" class="top-time-bar">--.--.----, --:--:--</div>

    <div id="scr-main" class="screen active">
        <div class="main-board">
            <div id="board-text">ЗАГРУЗКА...</div>
            <div id="announcement"></div>
        </div>
        <div class="btn-container">
            <button class="nav-btn btn-green" onclick="showRoutesList()">🚌 Маршруты и Остановки</button>
            <button class="nav-btn btn-blue" onclick="showScreen('scr-map')">🗺️ Линия маршрута</button>
            <button class="nav-btn btn-orange" onclick="showScreen('scr-balance')">💳 Баланс</button>
        </div>
        <div style="margin-top:40px; color:#bbb; cursor:pointer;" onclick="loginAdmin()">⚙️ adm_panel</div>
    </div>

    <div id="scr-map" class="screen">
        <button class="nav-btn btn-blue" onclick="showScreen('scr-main')">← Назад</button>
        <h2 id="map-dest-title" style="margin-top:30px; color:#333;"></h2>
        <div class="map-container">
            <div id="bus" class="bus-icon">🚌</div>
            <div class="map-label" style="left: 0;">СТАРТ</div>
            <div class="map-label" style="right: 0; text-align: right;">КОНЕЧНАЯ</div>
        </div>
        <div id="map-current-stop" style="margin-top: 50px; font-size: 20px; color: #e74c3c; font-weight: bold;"></div>
    </div>

    <div id="scr-balance" class="screen">
        <button class="nav-btn btn-blue" onclick="showScreen('scr-main')">← Назад</button>
        <div style="font-size: 60px; font-weight: 900; margin: 30px 0;">Ł <span id="bal-val">0</span></div>
        <div class="btn-container">
            <button class="nav-btn btn-green" onclick="addMoney()">➕ Пополнить (+1 Ł)</button>
            <button class="nav-btn btn-orange" onclick="buyTicket()">🎫 Купить билет (10 Ł)</button>
        </div>
        <div id="ticket-area" style="display:none; margin-top:20px;">
            <div id="qrcode"></div>
            <p style="color: green; font-weight: bold;">БИЛЕТ ОПЛАЧЕН</p>
        </div>
    </div>

    <div id="scr-routes" class="screen">
        <button class="nav-btn btn-blue" onclick="showScreen('scr-main')">← Назад</button>
        <div id="routes-buttons" class="btn-container" style="margin-top:20px;"></div>
    </div>

    <div id="scr-stops" class="screen">
        <button class="nav-btn btn-blue" onclick="showScreen('scr-routes')">← Назад</button>
        <div id="stops-container"></div>
    </div>

    <script>
        const routeData = {
            "5_shamir": { to: "Terminal 3", stops: ["∆ Egged Parking", "Katriel Rapaport / Haim Herzog", "Katriel Rapaport / Hana Michael Levin", "Hana Michael Levin / Haim Sharf", "Road 44 / Road Haim Herzog", "Shmotkin / Tulifman", "Central Station Rishon-LeTsion", "Shmotkin / Bershevsky", "Road HaMaCaBim / School Haklaii", "MichaelVeHanaLevin / Jerusalem", "Giv'ati / Aahim Suli'man", "Arav TZalach / Kupat Holim", "Road HaMaCaBim / Boulevard HaTsiyunot", "Sderot HaTsiyunot / HaaTzmayut", "Hana Michael Levin / Olga Vi'uvishua", "∆ Shamir Medical center"] },
            "5_egged": { to: "Egged Parking", stops: ["∆ Shamir Medical center", "Hana Michael Levin / Olga Vi'uvishua", "Sderot HaTsiyunot / HaaTzmayut", "Road HaMaCaBim / Boulevard HaTsiyunot", "Arav TZalach / Kupat Holim", "Giv'ati / Aahim Suli'man", "MichaelVeHanaLevin / Jerusalem", "Road HaMaCaBim / School Haklaii", "Shmotkin / Bershevsky", "Central Station Rishon-LeTsion", "Shmotkin / Tulifman", "Road 44 / Road Haim Herzog", "Hana Michael Levin / Haim Sharf", "Katriel Rapaport / Hana Michael Levin", "Katriel Rapaport / Haim Herzog", "∆ Egged Parking"] },
            "10_rail": { to: "HaRishonim Railway", stops: ["∆ Central Station Rishon-LeTsion", "Central Station / Leacify", "Giv'ati / Aahim Suli'man", "MichaelVeHanaLevin / Jerusalem", "Road HaMaCaBim / School Haklaii", "Shmotkin / Bershevsky", "Eli Choen / Gibuey Israel", "Eli Choen / MahaViley Exodus", "Shmotkin / Tulifman", "Road 44 / Road Haim Herzog", "∆ HaRishonim Railway Station"] },
            "10_cent": { to: "Central Station", stops: ["∆ HaRishonim Railway Station", "Road 44 / Road Haim Herzog", "Shmotkin / Tulifman", "Eli Choen / MahaViley Exodus", "Eli Choen / Gibuey Israel", "Shmotkin / Bershevsky", "Road HaMaCaBim / School Haklaii", "MichaelVeHanaLevin / Jerusalem", "Giv'ati / Aahim Suli'man", "Central Station / Leacify", "∆ Central Station Rishon-LeTsion"] },
            "14_malls": { to: "Malls (לקניונים)", stops: ["∆ Nesiya / HaTaisian", "Katriel Rapaport / Haim Herzog", "Katriel Rapaport / Hana Michael Levin", "Hana Michael Levin / Haim Sharf", "Road 44 / Road Haim Herzog", "Shmotkin / Tulifman", "Eli Choen / MahaViley Exodus", "Eli Choen / Gibuey Israel", "Shmotkin / Bershevsky", "Boulevard HaTsiyunot / Road HaMaCaBim", "Road HaMaCaBim / School Haklaii", "MichaelVeHanaLevin / Jerusalem", "Giv'ati / Aahim Suli'man", "Central Station Rishon-LeTsion", "Road HaMaCaBim = Sderot HaTsiyunot", "Sderot HaTsiyunot / HaaTzmayut", "Shamir Medical center", "Hana Michael Levin / Olga Vi'uvishua", "Davidson Garden / Segal", "Joseph Lishanski / David Saharov", "∆ Golden Mall / Moshe Levi"] },
            "14_inst": { to: "Institute", stops: ["∆ Golden Mall / Moshe Levi", "Joseph Lishanski / David Saharov", "Davidson Garden / Segal", "Hana Michael Levin / Olga Vi'uvishua", "Shamir Medical center", "Sderot HaTsiyunot / HaaTzmayut", "Road HaMaCaBim = Sderot HaTsiyunot", "Central Station Rishon-LeTsion", "Central Station / Leacify", "Giv'ati / Aahim Suli'man", "MichaelVeHanaLevin / Jerusalem", "Road HaMaCaBim / School Haklaii", "Boulevard HaTsiyunot / Road HaMaCaBim", "Shmotkin / Bershevsky", "Eli Choen / Gibuey Israel", "Eli Choen / MahaViley Exodus", "Shmotkin / Tulifman", "Road 44 / Road Haim Herzog", "Hana Michael Levin / Haim Sharf", "Katriel Rapaport / Hana Michael Levin", "Katriel Rapaport / Haim Herzog", "∆ Nesiya / HaTaisian"] },
            "15_talp": { to: "Talpiot", stops: ["∆ Central Station Rishon-LeTsion", "Central Station / Leacify", "Hana Michael Levin / Haim Sharf", "Shamir Medical Center", "Davidson Garden / Segal", "Joseph Lishanski / David Saharov", "HaZahaf Mall / Moshe Levi", "Giv'ati / Aahim Suli'man", "MichaelVeHanaLevin / Jerusalem", "Road HaMaCaBim / School Haklaii", "Boulevard HaTsiyunot / Road HaMaCaBim", "Shmotkin / Bershevsky", "∆ Eli Choen / Gibuey Israel"] },
            "15_cent": { to: "Central Station", stops: ["∆ Eli Choen / Gibuey Israel", "Shmotkin / Bershevsky", "Boulevard HaTsiyunot / Road HaMaCaBim", "Road HaMaCaBim / School Haklaii", "MichaelVeHanaLevin / Jerusalem", "Giv'ati / Aahim Suli'man", "HaZahaf Mall / Moshe Levi", "Joseph Lishanski / David Saharov", "Davidson Garden / Segal", "Shamir Medical Center", "Hana Michael Levin / Haim Sharf", "Central Station / Leacify", "∆ Central Station Rishon-LeTsion"] },
            "17_malls": { to: "Malls", stops: ["∆ Egged Parking", "Katriel Rapaport / Haim Herzog", "Katriel Rapaport / Hana Michael Levin", "Hana Michael Levin / Haim Sharf", "Road 44 / Road Haim Herzog", "Shmotkin / Tulifman", "Eli Choen / MahaViley Exodus", "Eli Choen / Gibuey Israel", "Shmotkin / Bershevsky", "Boulevard HaTsiyunot / Road HaMaCaBim", "Road HaMaCaBim / School Haklaii", "MichaelVeHanaLevin / Jerusalem", "Giv'ati / Aahim Suli'man", "Central Station Rishon-LeTsion", "Road HaMaCaBim / Boulevard HaTsiyunot", "Sderot HaTsiyunot / HaaTzmayut", "Shamir Medical center", "Hana Michael Levin / Olga Vi'uvishua", "Davidson Garden / Segal", "Joseph Lishanski / David Saharov", "∆ Golden Mall / Moshe Levi"] },
            "17_egged": { to: "Egged Parking", stops: ["∆ Golden Mall / Moshe Levi", "Joseph Lishanski / David Saharov", "Davidson Garden / Segal", "Hana Michael Levin / Olga Vi'uvishua", "Shamir Medical center", "Sderot HaTsiyunot / HaaTzmayut", "Road HaMaCaBim / Boulevard HaTsiyunot", "Central Station Rishon-LeTsion", "Central Station / Leacify", "Giv'ati / Aahim Suli'man", "MichaelVeHanaLevin / Jerusalem", "Road HaMaCaBim / School Haklaii", "Boulevard HaTsiyunot / Road HaMaCaBim", "Shmotkin / Bershevsky", "Eli Choen / Gibuey Israel", "Eli Choen / MahaViley Exodus", "Shmotkin / Tulifman", "Road 44 / Road Haim Herzog", "Hana Michael Levin / Haim Sharf", "Katriel Rapaport / Hana Michael Levin", "Katriel Rapaport / Haim Herzog", "∆ Egged Parking"] }
        };

        const ids = Object.keys(routeData);
        let balance = 100;
        let systemStatus = 'normal';

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function addMoney() { balance++; update(); }

        function buyTicket() {
            if (balance >= 10) {
                balance -= 10;
                update();
                document.getElementById('ticket-area').style.display = 'block';
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), {
                    text: "TICKET_VALID_" + Date.now(),
                    width: 128,
                    height: 128
                });
            } else {
                alert("Недостаточно Ł!");
            }
        }

        function getSeed() {
            const now = new Date();
            const timeKey = Math.floor((now.getHours() * 60 + now.getMinutes()) / 10);
            return (timeKey * 7 + 13) % ids.length;
        }

        function showRoutesList() {
            const cont = document.getElementById('routes-buttons'); cont.innerHTML = "";
            ids.forEach(id => {
                const btn = document.createElement('button'); btn.className = "nav-btn btn-green";
                btn.innerText = "Маршрут " + id.replace('_', ' → ');
                btn.onclick = () => showStops(id); cont.appendChild(btn);
            });
            showScreen('scr-routes');
        }

        function showStops(id) {
            document.getElementById('stops-container').innerHTML = routeData[id].stops.map(s => `<div style="background:white; padding:12px; border-bottom:1px solid #ddd; font-weight:bold;">${s}</div>`).join('');
            showScreen('scr-stops');
        }

        function update() {
            const now = new Date();
            document.getElementById('top-bar').innerText = now.toLocaleString();
            document.getElementById('bal-val').innerText = balance;
            const board = document.getElementById('board-text');
            const ann = document.getElementById('announcement');

            const currentKey = ids[getSeed()];
            const route = routeData[currentKey];
            const remain = 10 - (now.getMinutes() % 10);
            board.innerHTML = `קו ${currentKey.split('_')[0]} ל ${route.to} | ${remain} min`;

            const totalStops = route.stops.length;
            const progress = ((now.getMinutes() % 10) * 60 + now.getSeconds()) / 600;
            const stopIndex = Math.floor(progress * totalStops);
            const currentStop = route.stops[stopIndex] || route.stops[totalStops - 1];

            const cyclePhase = now.getSeconds() % 10;
            ann.innerText = (cyclePhase >= 5 ? "STOP: " : "NEXT: ") + currentStop.replace('∆ ', '');
            ann.className = cyclePhase >= 5 ? "blink" : "";

            document.getElementById('map-dest-title').innerText = `Маршрут ${currentKey.split('_')[0]} → ${route.to}`;
            document.getElementById('bus').style.left = Math.min(progress * 100, 92) + "%";
            document.getElementById('map-current-stop').innerText = currentStop;
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
