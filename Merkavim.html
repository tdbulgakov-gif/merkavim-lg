<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MERKAVIM v-20.9 - MAP IS BACK 🚌</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        body { background-image: url('5415960465159953094.jpg'); background-size: cover; background-position: top; background-attachment: fixed; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; }
        .header { background: white; padding: 15px; border-bottom: 1px solid #ddd; }
        .header h1 { margin: 0; font-size: 32px; letter-spacing: 2px; color: #333; font-weight: 900; }
        .top-time-bar { background: #2c3e50; color: white; padding: 8px; font-size: 16px; font-weight: bold; }
        .main-board { background: #202b36; color: #ff9d00; padding: 25px; border-radius: 15px; font-family: monospace; font-size: 24px; width: 85%; margin: 20px auto; border: 1px solid #444; min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
        #announcement { color: #ff4444; font-weight: bold; font-size: 20px; margin-top: 15px; min-height: 30px; }
        .blink { animation: blinker 0.8s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .btn-container { width: 90%; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { width: 100%; border: none; padding: 20px; border-radius: 15px; font-size: 20px; font-weight: bold; color: white; cursor: pointer; display: block;}
        .btn-green { background: #2e7d32; } .btn-blue { background: #3498db; } .btn-orange { background: #ff9f43; }
        .screen { display: none; padding: 20px; }
        .active { display: block; }
        .admin-panel { background: #f9f9f9; padding: 20px; border-radius: 15px; margin: 20px auto; width: 85%; display: none; border: 4px solid #333; }
        .admin-btn { width: 100%; padding: 15px; margin: 5px 0; font-weight: bold; border-radius: 10px; border: none; color: white; font-size: 18px; }
        .footer-gear { font-size: 14px; color: #bbb; cursor: pointer; margin: 40px 0; }

        /* СТИЛИ ДЛЯ КАРТЫ */
        .map-container { width: 90%; height: 50px; background: #bdc3c7; margin: 50px auto 20px auto; position: relative; border-radius: 25px; border: 4px solid #2c3e50; overflow: visible; }
        .bus-icon { position: absolute; top: -18px; font-size: 45px; transition: left 1s linear; z-index: 10; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5)); }
        .map-label { position: absolute; bottom: -35px; font-size: 14px; font-weight: bold; color: #2c3e50; width: 100px; }
    </style>
</head>
<body>

    <div class="header"><h1>MERKAVIM</h1></div>
    <div id="top-bar" class="top-time-bar">--.--.----, --:--:--</div>

    <div id="scr-main" class="screen active">
        <div class="main-board">
            <div id="board-text">ЗАГРУЗКА...</div>
            <div id="announcement"></div>
        </div>
        <div class="btn-container">
            <button class="nav-btn btn-green" onclick="showRoutesList()">🚌 Маршруты и Остановки</button>
            <button class="nav-btn btn-blue" onclick="showScreen('scr-map')">🗺️ Линия маршрута</button>
            <button class="nav-btn btn-orange" onclick="showScreen('scr-balance')">💳 Баланс</button>
        </div>

        <div id="admin-tools" class="admin-panel">
            <h2>CONTROL PANEL</h2>
            <button class="admin-btn" style="background:#e74c3c;" onclick="setSystemStatus('emergency')">תאונה (Авария)</button>
            <button class="admin-btn" style="background:#f39c12;" onclick="setSystemStatus('break')">הפסקה (Перерыв)</button>
            <button class="admin-btn" style="background:#2c3e50;" onclick="setSystemStatus('no-service')">לא בשירות (Стоп)</button>
            <button class="admin-btn" style="background:#27ae60;" onclick="setSystemStatus('normal')">СТАНДАРТ</button>
            <button class="admin-btn" style="background:#3498db;" onclick="document.getElementById('admin-tools').style.display='none'">Закрыть</button>
        </div>
        <div class="footer-gear" onclick="loginAdmin()">⚙️ adm_panel</div>
    </div>

    <div id="scr-map" class="screen">
        <button class="nav-btn btn-blue" onclick="showScreen('scr-main')">← Назад</button>
        <h2 id="map-dest-title" style="margin-top:30px; color:#333;"></h2>
        <div class="map-container">
            <div id="bus" class="bus-icon">🚌</div>
            <div class="map-label" style="left: 0;">СТАРТ</div>
            <div class="map-label" style="right: 0; text-align: right;">КОНЕЧНАЯ</div>
        </div>
        <div id="map-current-stop" style="margin-top: 50px; font-size: 20px; color: #e74c3c; font-weight: bold;"></div>
    </div>

    <div id="scr-balance" class="screen">
        <button class="nav-btn btn-blue" onclick="showScreen('scr-main')">← Назад</button>
        <div style="font-size: 60px; font-weight: 900; margin: 30px 0;">Ł <span id="bal-val">0</span></div>
        <div class="btn-container">
            <button class="nav-btn btn-green" onclick="addMoney()">➕ Пополнить (+1 Ł)</button>
            <button class="nav-btn btn-orange" onclick="buyTicket()">🎫 Купить билет (10 Ł)</button>
        </div>
        <div id="ticket-area" style="display:none; background:white; padding:20px; margin-top:20px; border-radius:15px; border:2px dashed #999;"><div id="qrcode" style="display:flex; justify-content:center;"></div></div>
    </div>
    <div id="scr-routes" class="screen"><button class="nav-btn btn-blue" onclick="showScreen('scr-main')">← Назад</button><div id="routes-buttons" class="btn-container" style="margin-top:20px;"></div></div>
    <div id="scr-stops" class="screen"><button class="nav-btn btn-blue" onclick="showScreen('scr-routes')">← Назад</button><div id="stops-container" style="margin-top:20px;"></div></div>

    <script>
        // ДАННЫЕ МАРШРУТОВ И БАЛАНСА ИЗ ПРОШЛЫХ ВЕРСИЙ
        const routeData = {
            "5_shamir": { to: "Terminal 3", voice: "קו 5 למרכז רפואי שמיר", stops: ["∆ Egged Parking", "Katriel Rapaport / Haim Herzog", "Katriel Rapaport / Hana Michael Levin", "Hana Michael Levin / Haim Sharf", "Road 44 / Road Haim Herzog", "Shmotkin / Tulifman", "Central Station / Leacify", "Central Station Rishon-LeTsion", "Shmotkin / Bershevsky", "Road HaMaCaBim / School Haklaii", "MichaelVeHanaLevin / Jerusalem", "Giv'ati / Aahim Suli'man", "Arav TZalach / Kupat Holim", "Road HaMaCaBim / Boulevard HaTsiyunot", "Sderot HaTsiyunot / HaaTzmayut", "Hana Michael Levin / Olga Vi'uvishua", "∆ Shamir Medical center"] },
            "5_egged": { to: "Egged Parking", voice: "קו 5 לחניון אגד", stops: ["∆ Shamir Medical center", "Hana Michael Levin / Olga Vi'uvishua", "Sderot HaTsiyunot / HaaTzmayut", "Road HaMaCaBim / Boulevard HaTsiyunot", "Arav TZalach / Kupat Holim", "Giv'ati / Aahim Suli'man", "MichaelVeHanaLevin / Jerusalem", "Road HaMaCaBim / School Haklaii", "Shmotkin / Bershevsky", "Central Station Rishon-LeTsion", "Central Station / Leacify", "Shmotkin / Tulifman", "Road 44 / Road Haim Herzog", "Hana Michael Levin / Haim Sharf", "Katriel Rapaport / Hana Michael Levin", "Katriel Rapaport / Haim Herzog", "∆ Egged Parking"] },
            "10_rail": { to: "HaRishonim Railway", voice: "קו 10 לרכבת הראשונים", stops: ["∆ Central Station Rishon-LeTsion", "Central Station / Leacify", "Giv'ati / Aahim Suli'man", "MichaelVeHanaLevin / Jerusalem", "Road HaMaCaBim / School Haklaii", "Shmotkin / Bershevsky", "Eli Choen / Gibuey Israel", "Eli Choen / MahaViley Exodus", "Shmotkin / Tulifman", "Road 44 / Road Haim Herzog", "∆ HaRishonim Railway Station"] },
            "10_cent": { to: "Central Station", voice: "קו 10 לתחנה מרכזית", stops: ["∆ HaRishonim Railway Station", "Road 44 / Road Haim Herzog", "Shmotkin / Tulifman", "Eli Choen / MahaViley Exodus", "Eli Choen / Gibuey Israel", "Shmotkin / Bershevsky", "Road HaMaCaBim / School Haklaii", "MichaelVeHanaLevin / Jerusalem", "Giv'ati / Aahim Suli'man", "Central Station / Leacify", "∆ Central Station Rishon-LeTsion"] },
            "14_malls": { to: "Malls (לקניונים)", voice: "קו 14 לקניונים", stops: ["∆ Nesiya / HaTaisian", "Katriel Rapaport / Haim Herzog", "Katriel Rapaport / Hana Michael Levin", "Hana Michael Levin / Haim Sharf", "Road 44 / Road Haim Herzog", "Shmotkin / Tulifman", "Eli Choen / MahaViley Exodus", "Eli Choen / Gibuey Israel", "Shmotkin / Bershevsky", "Boulevard HaTsiyunot / Road HaMaCaBim", "Road HaMaCaBim / School Haklaii", "MichaelVeHanaLevin / Jerusalem", "Giv'ati / Aahim Suli'man", "Central Station / Leacify", "Central Station Rishon-LeTsion", "Road HaMaCaBim = Sderot HaTsiyunot", "Sderot HaTsiyunot / HaaTzmayut", "Shamir Medical center", "Hana Michael Levin / Olga Vi'uvishua", "Davidson Garden / Segal", "Joseph Lishanski / David Saharov", "∆ Golden Mall / Moshe Levi"] },
            "14_inst": { to: "Institute", voice: "קו 14 למיכון וולקни", stops: ["∆ Golden Mall / Moshe Levi", "Joseph Lishanski / David Saharov", "Davidson Garden / Segal", "Hana Michael Levin / Olga Vi'uvishua", "Shamir Medical center", "Sderot HaTsiyunot / HaaTzmayut", "Road HaMaCaBim = Sderot HaTsiyunot", "Central Station Rishon-LeTsion", "Central Station / Leacify", "Giv'ati / Aahim Suli'man", "MichaelVeHanaLevin / Jerusalem", "Road HaMaCaBim / School Haklaii", "Boulevard HaTsiyunot / Road HaMaCaBim", "Shmotkin / Bershevsky", "Eli Choen / Gibuey Israel", "Eli Choen / MahaViley Exodus", "Shmotkin / Tulifman", "Road 44 / Road Haim Herzog", "Hana Michael Levin / Haim Sharf", "Katriel Rapaport / Hana Michael Levin", "Katriel Rapaport / Haim Herzog", "∆ Nesiya / HaTaisian"] },
            "15_talp": { to: "Talpiot", voice: "קו 15 לתלפיות", stops: ["∆ Central Station Rishon-LeTsion", "Central Station / Leacify", "Hana Michael Levin / Haim Sharf", "Shamir Medical Center", "Davidson Garden / Segal", "Joseph Lishanski / David Saharov", "HaZahaf Mall / Moshe Levi", "Giv'ati / Aahim Suli'man", "MichaelVeHanaLevin / Jerusalem", "Road HaMaCaBim / School Haklaii", "Boulevard HaTsiyunot / Road HaMaCaBim", "Shmotkin / Bershevsky", "∆ Eli Choen / Gibuey Israel"] },
            "15_cent": { to: "Central Station", voice: "קו 15 לתחנה מרכזית", stops: ["∆ Eli Choen / Gibuey Israel", "Shmotkin / Bershevsky", "Boulevard HaTsiyunot / Road HaMaCaBim", "Road HaMaCaBim / School Haklaii", "MichaelVeHanaLevin / Jerusalem", "Giv'ati / Aahim Suli'man", "HaZahaf Mall / Moshe Levi", "Joseph Lishanski / David Saharov", "Davidson Garden / Segal", "Shamir Medical Center", "Hana Michael Levin / Haim Sharf", "Central Station / Leacify", "∆ Central Station Rishon-LeTsion"] },
            "17_malls": { to: "Malls", voice: "קו 17 לקניונים", stops: ["∆ Egged Parking", "Katriel Rapaport / Haim Herzog", "Katriel Rapaport / Hana Michael Levin", "Hana Michael Levin / Haim Sharf", "Road 44 / Road Haim Herzog", "Shmotkin / Tulifman", "Eli Choen / MahaViley Exodus", "Eli Choen / Gibuey Israel", "Shmotkin / Bershevsky", "Boulevard HaTsiyunot / Road HaMaCaBim", "Road HaMaCaBim / School Haklaii", "MichaelVeHanaLevin / Jerusalem", "Giv'ati / Aahim Suli'man", "Central Station Rishon-LeTsion", "Road HaMaCaBim / Boulevard HaTsiyunot", "Sderot HaTsiyunot / HaaTzmayut", "Shamir Medical center", "Hana Michael Levin / Olga Vi'uvishua", "Davidson Garden / Segal", "Joseph Lishanski / David Saharov", "∆ Golden Mall / Moshe Levi"] },
            "17_egged": { to: "Egged Parking", voice: "קו 17 לחнион אגד", stops: ["∆ Golden Mall / Moshe Levi", "Joseph Lishanski / David Saharov", "Davidson Garden / Segal", "Hana Michael Levin / Olga Vi'uvishua", "Shamir Medical center", "Sderot HaTsiyunot / HaaTzmayut", "Road HaMaCaBim / Boulevard HaTsiyunot", "Central Station Rishon-LeTsion", "Central Station / Leacify", "Giv'ati / Aahim Suli'man", "MichaelVeHanaLevin / Jerusalem", "Road HaMaCaBim / School Haklaii", "Boulevard HaTsiyunot / Road HaMaCaBim", "Shmotkin / Bershevsky", "Eli Choen / Gibuey Israel", "Eli Choen / MahaViley Exodus", "Shmotkin / Tulifman", "Road 44 / Road Haim Herzog", "Hana Michael Levin / Haim Sharf", "Katriel Rapaport / Hana Michael Levin", "Katriel Rapaport / Haim Herzog", "∆ Egged Parking"] }
        };

        const ids = Object.keys(routeData);
        let systemStatus = localStorage.getItem('sys_status') || 'normal';
        let balance = parseInt(localStorage.getItem('legoins') || 100);

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function addMoney() { balance++; localStorage.setItem('legoins', balance); update(); }
        function buyTicket() {
            if (balance < 10) return alert("Мало Ł!");
            balance -= 10; localStorage.setItem('legoins', balance);
            document.getElementById('ticket-area').style.display = "block";
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: "TICKET_" + Date.now(), width: 120, height: 120 });
            update();
        }

        function loginAdmin() { if(prompt("Пароль:") === "2011") document.getElementById('admin-tools').style.display="block"; }
        function setSystemStatus(s) { systemStatus = s; localStorage.setItem('sys_status', s); update(); }

        function showRoutesList() {
            const cont = document.getElementById('routes-buttons'); cont.innerHTML = "";
            ids.forEach(id => {
                const btn = document.createElement('button'); btn.className = "nav-btn btn-green";
                btn.innerText = "Линия " + id.split('_')[0] + " → " + routeData[id].to;
                btn.onclick = () => showStops(id); cont.appendChild(btn);
            });
            showScreen('scr-routes');
        }

        function showStops(id) {
            document.getElementById('stops-container').innerHTML = routeData[id].stops.map(s => `<div style="background:white; padding:10px; margin:5px; border-left:5px solid green; font-weight:bold;">${s}</div>`).join('');
            const u = new SpeechSynthesisUtterance(routeData[id].voice); u.lang = 'he-IL'; window.speechSynthesis.speak(u);
            showScreen('scr-stops');
        }

        function update() {
            const now = new Date(); const day = now.getDay(); const hrs = now.getHours(); const mins = now.getMinutes();
            document.getElementById('top-bar').innerText = now.toLocaleString();
            document.getElementById('bal-val').innerText = balance;
            const board = document.getElementById('board-text'); const ann = document.getElementById('announcement');

            // 1. АДМИН-СТАТУСЫ
            if (systemStatus !== 'normal') {
                ann.innerText = "";
                if (systemStatus === 'emergency') board.innerHTML = '<span style="color:red" class="blink">תאונה (Авария)</span>';
                else if (systemStatus === 'break') board.innerHTML = '<span style="color:orange">הפסקה (Перерыв)</span>';
                else if (systemStatus === 'no-service') board.innerHTML = '<span style="color:gray">לא בשירות (Стоп)</span>';
                return;
            }

            // 2. ЗЕЛЕНЫЙ БРОККОЛИ (ШАББАТ И НОЧЬ)
            const isShabbat = (day === 5 && (hrs > 16 || (hrs === 16 && mins >= 30))) || (day === 6 && hrs < 20);
            const isNight = (hrs >= 23 && mins >= 15) || (hrs < 7) || (hrs === 7 && mins < 15);
            if (isShabbat || isNight) { board.innerHTML = '<span style="color:#2ecc71; font-weight:bold;">אין קווים</span>'; ann.innerText = ""; return; }

            // 3. РАСПИСАНИЕ И ЛОГИКА ОСТАНОВОК
            const syncIdx = Math.floor((hrs * 60 + mins) / 10) % ids.length;
            const currentKey = ids[syncIdx]; const route = routeData[currentKey];
            const remainMin = 10 - (mins % 10);
            board.innerHTML = `קו ${currentKey.split('_')[0]} ל ${route.to} | ${remainMin} min`;
            
            const progress = (mins % 10) / 10;
            const stopIdx = Math.min(Math.floor(progress * route.stops.length), route.stops.length - 1);
            const currentStop = route.stops[stopIdx];
            ann.innerText = (now.getSeconds() < 30 ? "Next: " : "Stop: ") + currentStop;
            ann.className = now.getSeconds() >= 30 ? "blink" : "";

            // 4. ОБНОВЛЕНИЕ КАРТЫ И АВТОБУСА (СИНХРОННО)
            document.getElementById('map-dest-title').innerText = `Линия ${currentKey.split('_')[0]} → ${route.stops[route.stops.length - 1].replace('∆ ', '')}`;
            document.getElementById('bus').style.left = Math.min(progress * 100, 93) + "%"; // Плавное движение
            document.getElementById('map-current-stop').innerText = currentStop;
        }

        setInterval(update, 1000); update();
    </script>
</body>
</html>
